<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IA Générateur de Sons</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; padding: 50px; background: #0f172a; color: white; }
        .container { background: #1e293b; padding: 30px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 450px; text-align: center; }
        input { width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #334155; border-radius: 8px; box-sizing: border-box; background: #0f172a; color: white; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; }
        button:disabled { background: #1e293b; color: #64748b; border: 1px solid #334155; cursor: not-allowed; }
        #audioPlayer { width: 100%; margin-top: 25px; display: none; }
        .loader { display: none; margin-top: 15px; color: #94a3b8; font-size: 0.9em; }
        .translation { font-size: 0.8em; color: #60a5fa; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h2>Générateur de Son IA</h2>
    <p>Tapez un son en français :</p>
    
    <input type="text" id="promptInput" placeholder="Ex: Un chien qui aboie">
    <button id="generateBtn">Créer le son</button>
    
    <div id="loader" class="loader">Traduction et création du son... (patientez 20s)</div>
    <div id="translationInfo" class="translation"></div>
    
    <audio id="audioPlayer" controls></audio>
</div>

<script>
    // COLLEZ VOTRE TOKEN ICI ENTRE LES GUILLEMETS
    const API_TOKEN = "hf_VOTRE_TOKEN_ICI"; 
    const MODEL_ID = "cvssp/audioldm-m-full";

    const btn = document.getElementById('generateBtn');
    const input = document.getElementById('promptInput');
    const player = document.getElementById('audioPlayer');
    const loader = document.getElementById('loader');
    const transDiv = document.getElementById('translationInfo');

    btn.addEventListener('click', async () => {
        const text = input.value;
        if (!text) return alert("Entrez une description");

        btn.disabled = true;
        loader.style.display = "block";
        player.style.display = "none";
        transDiv.innerText = "";

        try {
            // 1. TRADUCTION AUTOMATIQUE (Français -> Anglais)
            const transRes = await fetch(`https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=fr|en`);
            const transData = await transRes.json();
            const translatedText = transData.responseData.translatedText;
            transDiv.innerText = "IA interprète : " + translatedText;

            // 2. GÉNÉRATION DU SON
            const response = await fetch(`https://api-inference.huggingface.co/models/${MODEL_ID}`, {
                headers: { Authorization: `Bearer ${API_TOKEN}` },
                method: "POST",
                body: JSON.stringify({ inputs: translatedText }),
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error || "L'IA est occupée, réessayez dans 10 secondes.");
            }

            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            player.src = url;
            player.style.display = "block";
        } catch (error) {
            alert("Erreur : " + error.message);
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    });
</script>

</body>
</html>
